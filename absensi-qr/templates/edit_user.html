<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Edit User</title>

    <!-- BOOTSTRAP -->
    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <style>

        body{
            background: #f4f6f9;
        }

        .card{

            border: none;

            border-radius: 20px;

        }

    </style>

</head>
<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body">

            <h3 class="mb-4">

                Edit User

            </h3>

            <form method="POST">

                <!-- NAMA -->

                <div class="mb-3">

                    <label class="form-label">

                        Nama

                    </label>

                    <input
                    type="text"
                    name="nama"
                    class="form-control"
                    value="{{ user[1] }}"
                    required>

                </div>

                <!-- USERNAME -->

                <div class="mb-3">

                    <label class="form-label">

                        Username

                    </label>

                    <input
                    type="text"
                    name="username"
                    class="form-control"
                    value="{{ user[2] }}"
                    required>

                </div>

                <!-- PASSWORD -->

                <div class="mb-3">

                    <label class="form-label">

                        Password

                    </label>

                    <input
                    type="text"
                    name="password"
                    class="form-control"
                    value="{{ user[3] }}"
                    required>

                </div>

                <!-- ROLE -->

                <div class="mb-3">

                    <label class="form-label">

                        Role

                    </label>

                    <select
                    name="role"
                    class="form-control">

                        <option
                        value="admin"
                        {% if user[4] == 'admin' %}
                        selected
                        {% endif %}>

                            Admin

                        </option>

                        <option
                        value="user"
                        {% if user[4] == 'user' %}
                        selected
                        {% endif %}>

                            User

                        </option>

                    </select>

                </div>

                <!-- BUTTON -->

                <button
                type="submit"
                class="btn btn-primary">

                    Update User

                </button>

                <a
                href="/users"
                class="btn btn-secondary">

                    Kembali

                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
